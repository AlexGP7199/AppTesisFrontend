<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>HoneypotTrack</h2>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="nav-icon">&#9751;</span> Inicio
      </a>
      <a routerLink="/categorias" routerLinkActive="active">
        <span class="nav-icon">&#9776;</span> Categorías
      </a>
      <a routerLink="/usuarios" routerLinkActive="active">
        <span class="nav-icon">&#9787;</span> Usuarios
      </a>
      <a routerLink="/cuentas" routerLinkActive="active">
        <span class="nav-icon">&#9830;</span> Cuentas
      </a>
      <a routerLink="/transacciones" routerLinkActive="active">
        <span class="nav-icon">&#8644;</span> Transacciones
      </a>
      <a routerLink="/contactos" routerLinkActive="active">
        <span class="nav-icon">&#9742;</span> Contactos
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">{{ userName }}</div>
      <button class="btn-logout" (click)="onLogout()">Cerrar Sesión</button>
    </div>
  </aside>
  <main class="main-content">
    <router-outlet />
  </main>
</div>
