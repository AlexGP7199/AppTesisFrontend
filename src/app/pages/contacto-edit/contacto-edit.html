<div class="edit-page">
  <div class="page-header">
    <div>
      <h1>Editar Contacto</h1>
      <p class="page-subtitle">ID en edición: {{ contactId }}</p>
    </div>
    <div class="page-actions">
      <a class="btn-secondary" routerLink="/contactos">Volver al listado</a>
    </div>
  </div>

  @if (errorMessage) {
    <div class="alert-error">{{ errorMessage }}</div>
  }

  @if (successMessage) {
    <div class="alert-success">{{ successMessage }}</div>
  }

  @if (isLoading) {
    <div class="empty-state"><p>Cargando contacto...</p></div>
  } @else {
    <div class="edit-card">
      <div class="edit-meta">
        <span class="meta-label">Ruta actual</span>
        <code>/contactos/{{ contactId }}/editar</code>
      </div>

      <form (ngSubmit)="save()">
        <div class="form-group">
          <label for="contactsId">ID</label>
          <input type="number" id="contactsId" [ngModel]="formData.contactsId" name="contactsId" readonly />
        </div>

        <div class="form-group">
          <label for="userId">Usuario</label>
          <select id="userId" [(ngModel)]="formData.userId" name="userId" required>
            @for (usuario of usuarios; track usuario.userId) {
              <option [value]="usuario.userId">{{ usuario.fullName }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" [(ngModel)]="formData.name" name="name" required maxlength="100" />
        </div>

        <div class="form-group">
          <label for="type">Tipo</label>
          <input type="text" id="type" [(ngModel)]="formData.type" name="type" required maxlength="50" />
        </div>

        <div class="form-group">
          <label for="email">Correo</label>
          <input type="email" id="email" [(ngModel)]="formData.email" name="email" maxlength="100" />
        </div>

        <div class="form-group">
          <label for="phone">Teléfono</label>
          <input type="text" id="phone" [(ngModel)]="formData.phone" name="phone" maxlength="20" />
        </div>

        <div class="page-actions">
          <button type="button" class="btn-secondary" (click)="goBack()">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="isSaving">{{ isSaving ? 'Guardando...' : 'Actualizar' }}</button>
        </div>
      </form>
    </div>
  }
</div>
