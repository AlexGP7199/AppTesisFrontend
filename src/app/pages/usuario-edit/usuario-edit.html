<div class="edit-page">
  <div class="page-header">
    <div>
      <h1>Editar Usuario</h1>
      <p class="page-subtitle">ID en edición: {{ userId }}</p>
    </div>
    <div class="page-actions">
      <a class="btn-secondary" routerLink="/usuarios">Volver al listado</a>
    </div>
  </div>

  @if (errorMessage) {
    <div class="alert-error">{{ errorMessage }}</div>
  }

  @if (successMessage) {
    <div class="alert-success">{{ successMessage }}</div>
  }

  @if (isLoading) {
    <div class="empty-state"><p>Cargando usuario...</p></div>
  } @else {
    <div class="edit-card">
      <div class="edit-meta">
        <span class="meta-label">Ruta actual</span>
        <code>/usuarios/{{ userId }}/editar</code>
      </div>

      <form (ngSubmit)="save()">
        <div class="form-group">
          <label for="userId">ID</label>
          <input type="number" id="userId" [ngModel]="formData.userId" name="userId" readonly />
        </div>

        <div class="form-group">
          <label for="fullName">Nombre completo</label>
          <input type="text" id="fullName" [(ngModel)]="formData.fullName" name="fullName" required maxlength="100" />
        </div>

        <div class="form-group">
          <label for="email">Correo</label>
          <input type="email" id="email" [(ngModel)]="formData.email" name="email" required maxlength="100" />
        </div>

        <div class="page-actions">
          <button type="button" class="btn-secondary" (click)="goBack()">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="isSaving">{{ isSaving ? 'Guardando...' : 'Actualizar' }}</button>
        </div>
      </form>
    </div>
  }
</div>
